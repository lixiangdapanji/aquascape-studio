name: deploy-infra
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, stage, prod]
        default: dev
      action:
        description: synth | diff | deploy
        type: choice
        options: [synth, diff, deploy]
        default: diff
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/deploy-infra.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  cdk:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Assume deploy role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: us-east-1

      - name: Pick action
        id: pick
        run: |
          A="${{ github.event.inputs.action }}"
          [ -z "$A" ] && A=diff
          echo "action=$A" >> "$GITHUB_OUTPUT"

      - name: CDK ${{ steps.pick.outputs.action }}
        working-directory: infra
        run: |
          case "${{ steps.pick.outputs.action }}" in
            synth)  pnpm cdk synth  --context env=${{ github.event.inputs.environment || 'dev' }} ;;
            diff)   pnpm cdk diff   --context env=${{ github.event.inputs.environment || 'dev' }} ;;
            deploy) pnpm cdk deploy --all --context env=${{ github.event.inputs.environment || 'dev' }} --require-approval never ;;
          esac
